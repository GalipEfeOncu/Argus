name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend type-check, test, and build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run type-check
      - run: npm run test
      - run: npm run test:benchmarks
      - run: npm run build

  backend:
    name: Backend import and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
        working-directory: backend
      - run: python -c "import app.main; print('backend import OK')"
        working-directory: backend
      - run: python -m pytest -q
        working-directory: backend

  contracts:
    name: Generated contract drift
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - run: npm ci
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
        working-directory: backend
      - run: npm run check:contracts
        env:
          ARGUS_BACKEND_PYTHON: python

  rust:
    name: Rust format, clippy, and test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            wget
      - run: cargo fmt --check
        working-directory: src-tauri
      - run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - run: cargo test
        working-directory: src-tauri

  docs:
    name: Documentation checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .agents/skills/argus-development/scripts/check_docs.py

  secrets:
    name: Secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
